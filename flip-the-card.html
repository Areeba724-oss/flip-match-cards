<!-- Updated Memory Game with Matched Card Animation -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Memory Card Flip Game</title>
<style>
:root {
  --bg-light: #f0f8ff;
  --card-back-light: #87ceeb;
  --card-front-light: #ffffff;
  --accent-light: #00bfff;

  --bg-dark: #0f172a;
  --card-back-dark: #0ea5a4;
  --card-front-dark: #f8fafc;
  --accent-dark: #06b6d4;
}

/* Basic setup */
* { box-sizing:border-box; font-family:"Segoe UI", Roboto, Arial, sans-serif; }
body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; text-align:center;}
body.light { background: var(--bg-light); color:#0f172a; --card-back: var(--card-back-light); --card-front: var(--card-front-light); --accent: var(--accent-light);}
body.dark { background: var(--bg-dark); color:white; --card-back: var(--card-back-dark); --card-front: var(--card-front-dark); --accent: var(--accent-dark); }

.container { width:980px; max-width:98%; }
h1 { margin:0 0 8px 0; font-size:28px; }

.controls { display:flex; gap:12px; align-items:center; justify-content:center; margin:12px 0 20px; flex-wrap:wrap;}
.stats { background: rgba(255,255,255,0.2); padding:8px 14px; border-radius:12px; display:flex; gap:12px; align-items:center; font-size:14px;}
.btn { background: var(--accent); color:#042024; border:none; padding:8px 14px; border-radius:10px; font-weight:600; cursor:pointer;}
.btn.secondary { background: transparent; color:inherit; border:1px solid rgba(0,0,0,0.1); }

.grid { margin-top:18px; display:grid; grid-template-columns: repeat(6,1fr); gap:12px; justify-items:center;}

.card { width:120px; height:140px; perspective:1000px; cursor:pointer; }
.card-inner { position:relative; width:100%; height:100%; transition: transform 0.5s, background 0.5s; transform-style: preserve-3d; border-radius:12px; }
.card.flipped .card-inner { transform: rotateY(180deg); }

/* Matched card animation */
.card.matched .card-inner {
  background: #4ade80; /* green highlight */
  box-shadow: 0 0 15px #a3f7a3, 0 0 25px #6ee86e inset;
  animation: matchedAnim 0.8s ease-in-out forwards;
}

@keyframes matchedAnim {
  0% { transform: rotateY(180deg) scale(1); box-shadow: 0 0 10px #6ee86e; }
  25% { transform: rotateY(180deg) scale(1.1) rotate(5deg); box-shadow: 0 0 20px #4aff7a; }
  50% { transform: rotateY(180deg) scale(1.2) rotate(-5deg); box-shadow: 0 0 30px #00ff7f; }
  75% { transform: rotateY(180deg) scale(1.1) rotate(5deg); box-shadow: 0 0 20px #4aff7a; }
  100% { transform: rotateY(180deg) scale(1) rotate(0deg); box-shadow: 0 0 15px #6ee86e, 0 0 25px #6ee86e inset; }
}

.card-face { position:absolute; inset:0; backface-visibility:hidden; display:flex; justify-content:center; align-items:center; border-radius:12px; font-size:48px; user-select:none; }
.card-front { background: var(--card-front); color:#0f172a; transform: rotateY(180deg); }
.card-back { background: var(--card-back); color:white; font-weight:700; }

.small { font-size:14px; opacity:0.85; margin-top:14px; }

/* Start Menu */
.menu { display:flex; flex-direction:column; align-items:center; justify-content:center; height:90vh; gap:20px; background: linear-gradient(135deg, #87ceeb, #f0f8ff); border-radius:16px; padding:40px; box-shadow:0 8px 20px rgba(0,0,0,0.2); width:720px; margin:auto;}
.menu h2 { font-size:32px; margin-bottom:12px; color:#034f84; text-shadow:1px 1px 2px #ccc;}
.menu label { font-weight:600; margin-right:8px; color:#034f84;}
.menu select { padding:6px 12px; border-radius:8px; border:1px solid #ccc; font-size:16px; cursor:pointer; background-color:white; }
.menu select:hover { border-color:#06b6d4; }
.menu .btn { padding:10px 20px; font-size:18px; border-radius:12px; border:none; cursor:pointer; font-weight:600; background:#00bfff; color:white; transition:0.3s; box-shadow:0 4px 10px rgba(0,0,0,0.2);}
.menu .btn:hover { background:#009acd; transform:translateY(-2px); box-shadow:0 6px 15px rgba(0,0,0,0.25);}
</style>
</head>
<body class="light">
<div id="startMenu" class="menu">
  <h2>Memory Card Game 🃏</h2>
  <div>
    <label for="levelSelect">Level:</label>
    <select id="levelSelect">
      <option value="2x6">Easy (6 Pairs)</option>
      <option value="3x6">Hard (9 Pairs)</option>
    </select>
  </div>
  <div>
    <label for="themeSelect">Theme:</label>
    <select id="themeSelect">
      <option value="light">Light</option>
      <option value="dark">Dark</option>
    </select>
  </div>
  <button class="btn" id="startBtn">Start Game</button>
</div>

<div class="container" id="gameContainer" style="display:none;">
  <h1>Memory Card Flip Game 🃏</h1>
  <div class="controls">
    <div class="stats">
      <div>⏱ Time: <strong id="time">0s</strong></div>
      <div>🔁 Moves: <strong id="moves">0</strong></div>
      <div>⭐ Score: <strong id="score">0</strong></div>
    </div>
    <button class="btn" id="restartBtn">Restart</button>
  </div>
  <div class="grid" id="grid"></div>
  <div class="small" id="message"></div>
</div>

<script>
(() => {
  const EMOJIS = ["🍎","🍌","🍇","🍓","🍉","🍒","🍑","🍍","🥝","🍊","🥥","🍐","🍋","🍈","🍏","🥭"];
  const grid=document.getElementById('grid'), timeEl=document.getElementById('time'), movesEl=document.getElementById('moves'), scoreEl=document.getElementById('score'), messageEl=document.getElementById('message');
  const restartBtn=document.getElementById('restartBtn'), startMenu=document.getElementById('startMenu'), gameContainer=document.getElementById('gameContainer');
  const levelSelect=document.getElementById('levelSelect'), themeSelect=document.getElementById('themeSelect'), startBtn=document.getElementById('startBtn');

  let rows=3, cols=6, totalPairs, firstCard=null, secondCard=null, lock=false, matched=0, moves=0, time=0, timer=null;

  function calculateScore(){ return Math.max(0, matched*20 - moves - Math.floor(time/2)); }

  function startTimer(){ clearInterval(timer); timer=setInterval(()=>{ time++; timeEl.textContent=time+"s"; scoreEl.textContent=calculateScore(); },1000); }

  function startGame(r=3,c=6){
    rows=r; cols=c; totalPairs=Math.floor(rows*cols/2);
    clearInterval(timer); time=0; moves=0; matched=0; lock=false; firstCard=null; secondCard=null;
    grid.innerHTML=""; timeEl.textContent="0s"; movesEl.textContent="0"; scoreEl.textContent="0"; messageEl.textContent="";
    grid.style.gridTemplateColumns=`repeat(${cols},1fr)`;

    let chosen=EMOJIS.slice(0).sort(()=>Math.random()-0.5).slice(0,totalPairs);
    let cardsArr=[...chosen,...chosen].sort(()=>Math.random()-0.5);

    cardsArr.forEach(emoji=>{
      const card=document.createElement('div'); 
      card.className='card'; 
      card.dataset.emoji=emoji;
      card.innerHTML=`<div class="card-inner"><div class="card-face card-front">${emoji}</div><div class="card-face card-back">?</div></div>`;
      card.onclick=()=>flipCard(card);
      grid.appendChild(card);
    });

    startTimer();
  }

  function flipCard(card){
    if(lock || card.classList.contains('flipped') || card.classList.contains('matched')) return;
    card.classList.add('flipped');

    if(!firstCard){ firstCard=card; return; }
    secondCard=card; lock=true; moves++; movesEl.textContent=moves;

    if(firstCard.dataset.emoji===secondCard.dataset.emoji){
      matched++; 
      firstCard.classList.add('matched'); 
      secondCard.classList.add('matched');
      firstCard=null; secondCard=null; lock=false; scoreEl.textContent=calculateScore();
      if(matched===totalPairs){ clearInterval(timer); messageEl.textContent="🎉 You Won! Excellent Memory!"; }
    } else {
      setTimeout(()=>{
        firstCard.classList.remove('flipped'); 
        secondCard.classList.remove('flipped');
        firstCard=null; secondCard=null; lock=false;
      },800);
    }
  }

  restartBtn.onclick=()=>{
    clearInterval(timer);
    gameContainer.style.display="none";
    startMenu.style.display="flex";
  }

  startBtn.onclick = () => {
    const level = levelSelect.value; 
    const theme = themeSelect.value;
    document.body.className = theme;
    if(level==="2x6") startGame(2,6);
    else startGame(3,6);
    startMenu.style.display="none";
    gameContainer.style.display="block";
  }

})();
</script>
</body>
</html>
